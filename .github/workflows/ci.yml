name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  transpiler:
    name: Build Rust/WASM Transpiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      
      - name: Build WASM
        working-directory: packages/transpiler
        run: wasm-pack build --target web

      - name: Run tests
        working-directory: packages/transpiler
        run: cargo test

  frontend:
    name: Build Next.js Frontend
    runs-on: ubuntu-latest
    needs: transpiler
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        working-directory: apps/web
        run: npm run build

  backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: services/backend
        run: npm install
      
      - name: Type check
        working-directory: services/backend
        run: npx tsc --noEmit